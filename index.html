<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تهنئة عيد الفطر</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:'Cairo',sans-serif;
      background: linear-gradient(135deg,#0b1f4d,#0e2a66);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      padding:20px;
    }

    /* صفحة البداية */
    .start{
      text-align:center;
      color:#fff;
      width:100%;
      max-width:420px;
    }

    .start h2{
      margin-bottom:15px;
      font-size:24px;
    }

    .start input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:18px;
      text-align:center;
      outline:none;
      margin-bottom:12px;
    }

    .start button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#d4af37;
      color:#fff;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    /* كرت العيد */
    .card{
      display:none;
      position:relative;
      width:min(95vw, 800px);
      aspect-ratio: 1301 / 919;
      margin-top:20px;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
      background:#fff;
    }

    /* صورة الخلفية */
    .card img.bg{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    /* الاسم */
    .name{
      position:absolute;
      right:  100px;
      bottom: 120px;
      color:#000000;
      font-weight:800;
      font-size: clamp(18px, 2.1vw, 30px);
      text-align:center;
      line-height:1.4;
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* زر الحفظ */
    .saveBtn{
      display:none;
      margin-top:18px;
      padding:14px 28px;
      border:none;
      border-radius:14px;
      background:#d4af37;
      color:#fff;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      box-shadow:0 8px 25px rgba(0,0,0,0.25);
    }

    /* للجوال */
    @media (max-width: 768px){
      .card{
        width:95vw;
        border-radius:20px;
      }

      .name{
        right: 11%;
        bottom: 13%;
        max-width: 34%;
        font-size: clamp(13px, 2.3vw, 20px);
        color:#000000;
      }

      .start h2{
        font-size:20px;
      }
    }
  </style>
</head>
<body>

  <!-- صفحة البداية -->
  <div class="start" id="startPage">
    <h2>اكتب اسمك لعرض تهنئة العيد</h2>
    <input type="text" id="username" placeholder="اكتب الاسم هنا">
    <button onclick="showCard()">عرض التهنئة</button>
  </div>

  <!-- كرت العيد -->
  <div class="card" id="card">
    <img src="eid-card.JPEG" alt="Eid Card" class="bg">
    <div class="name" id="nameText"></div>
  </div>

  <!-- زر الحفظ -->
  <button class="saveBtn" id="saveBtn" onclick="saveImage()">حفظ الصورة</button>

  <!-- مكتبة حفظ الصورة -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <script>
    function showCard(){
      const name = document.getElementById("username").value.trim();

      if(name === ""){
        alert("اكتب الاسم أول");
        return;
      }

      document.getElementById("nameText").innerText = name;
      document.getElementById("startPage").style.display = "none";
      document.getElementById("card").style.display = "block";
      document.getElementById("saveBtn").style.display = "inline-block";
    }

    function saveImage(){
      const card = document.getElementById("card");

      html2canvas(card, {
        useCORS: true,
        scale: 3
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "eid-card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>

</body>
</html>
